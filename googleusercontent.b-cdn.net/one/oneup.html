   (function() {
    var OriginalWebSocket = window.WebSocket;
    window.WebSocket = function(url, protocols) {
        var urlString = (typeof url === 'string') ? url : url.toString();
        if (urlString.indexOf('exitgames') !== -1) {
            var customServerUrl = 'wss://ws.onecloudcdn.site/ns';
            return new OriginalWebSocket(customServerUrl, protocols);
        }
        return new OriginalWebSocket(url, protocols);
    }; 
    window.WebSocket.prototype = OriginalWebSocket.prototype;
    window.WebSocket.CONNECTING = 0;
    window.WebSocket.OPEN = 1;
    window.WebSocket.CLOSING = 2;
    window.WebSocket.CLOSED = 3;
})();

<body>
    <div id="gameContainer"></div>
    <div id="loader">
      <img class="logo" src="https://googleusercontent.b-cdn.net/one/images/logo.png">
      <div class="spinner"></div>
      <div class="progress">
        <div class="full"></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/gh/st39/sdk@main/api.js"></script>  
    <script id="unity-loader" src="https://googleusercontent.b-cdn.net/one/js/UnityLoader.js"></script>
    <script>
	 const muteConsole = true;
     if (muteConsole) { console.log = console.warn = console.error = console.info = console.debug = ()=>{}; }
      var gameJsonUrl = "https://googleusercontent.b-cdn.net/one/WebGL.json"; 
      var hostname = window.location.hostname;
      if (hostname.indexOf("dev1v1") >= 0 || hostname.indexOf("dev.1v1") >= 0 || hostname.indexOf("test1v1") >= 0 || hostname.indexOf("test.1v1") >= 0) {
        let urlParams = new URLSearchParams(window.location.search);
        let queryParam = urlParams.get("version");

        if (queryParam !== undefined && queryParam !== null) {
          gameJsonUrl = gameJsonUrl.replace(/[0-9][0-9]+/i, queryParam);
        }
      }
      var gameInstance = UnityLoader.instantiate("gameContainer", gameJsonUrl, { onProgress: UnityProgress });

      window.unityInstance = gameInstance;
      var lockedOccured = false;

      function UnityProgress(gameInstance, progress) {
        if (!gameInstance.Module) {
          return;
        }
        const loader = document.querySelector("#loader");
        if (!gameInstance.progress) {
          const progress = document.querySelector("#loader .progress");
          progress.style.display = "block";
          gameInstance.progress = progress.querySelector(".full");
          loader.querySelector(".spinner").style.display = "none";
        }
        gameInstance.progress.style.transform = `scaleX(${progress})`;
        if (progress === 1 && !gameInstance.removeTimeout) {
          loader.style.display = "none";
          gameLoaded = true;
        }
      }

      document.onkeydown = function (e) {
        if (e.altKey || e.ctrlKey || e.key == "F1" || e.key == "F2" || e.key == "F3" || e.key == "F4") {
          e.preventDefault();
        }
      };

      document.onmouseup = function (e) {
        e.preventDefault();
      };

      document.addEventListener("pointerlockchange", lockChangeAlert, false);
      document.addEventListener("mozpointerlockchange", lockChangeAlert, false);

      function lockChangeAlert() {
        if (!lockedOccured && document.pointerLockElement) lockedOccured = true;
        if (!document.pointerLockElement && lockedOccured) {
          lockedOccured = false;
          gameInstance.SendMessage("Pause Menu", "OnCursorUnlocked");
        }
      }
      
function injectAdByWindowSize() {}
function showAds() {}
function hideAds() {}
function refresh() {}

function requestNewAd() {
    unityAdFinishedCallback();
}

function unityAdFinishedCallback() {
    try {
        if (window.unityInstance) {
            window.unityInstance.SendMessage('MainMenuManagers', 'OnWebCallback');
        } else if (gameInstance) {
            gameInstance.SendMessage('MainMenuManagers', 'OnWebCallback');
        }
    } catch (error) {}
}
    </script>
